<!doctype html>
<html lang="en">
  <head>
    <title>NeuroPulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="game-body">
    <!-- Navbar -->
    <div class="navbar">
      <span id="user-email"></span>
      <div>
        <button onclick="goLeaderboard()">Leaderboard</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Round flash overlay -->
    <div class="round-flash" id="round-flash"></div>

    <h1 id="level-title">NeuroPulse</h1>

    <div class="score-board">
      <span id="level-display">LEVEL: 0</span>
      <span id="high-score">BEST: 0</span>
    </div>

    <div class="game-action-btns">
      <button id="start-btn" class="start-btn">START GAME</button>
      <button id="restart-btn" class="restart-btn">RESTART</button>
    </div>

    <!-- Simon Board -->
    <div class="simon-board">
      <div class="simon-ring"></div>
      <div class="container">
        <div id="green" class="btn green"></div>
        <div id="red" class="btn red"></div>
        <div id="yellow" class="btn yellow"></div>
        <div id="blue" class="btn blue"></div>
      </div>
    </div>

    <!-- Streak progress bar -->
    <div class="streak-bar">
      <div class="streak-fill" id="streak-fill"></div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/game.js"></script>

    <script>
      const email = localStorage.getItem("email");
      if (!email) window.location.href = "login.html";
      document.getElementById("user-email").textContent = "Welcome: " + email;

      function logout() {
        localStorage.clear();
        window.location.href = "login.html";
      }

      function goLeaderboard() {
        window.location.href = "leaderboard.html";
      }
    </script>
  </body>
</html>
