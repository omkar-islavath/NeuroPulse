<!doctype html>
<html lang="en">
  <head>
    <title>NeuroPulse – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="login-body">
    <div class="login-container">
      <h1 class="logo-title">NeuroPulse</h1>
      <p class="subtitle">Login to continue</p>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" />
      </div>

      <div class="input-group password-wrapper">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
        <span class="toggle-password" onclick="togglePassword()">👁</span>
      </div>

      <div class="forgot-password">
        <a href="forgot-password.html">Forgot Password?</a>
      </div>

      <button class="primary-btn" id="login-btn" onclick="loginUser()">
        <span id="btn-text">LOGIN</span>
      </button>

      <button class="secondary-btn" onclick="signupUser()">SIGN UP</button>

      <p id="auth-status" class="status-text"></p>
    </div>

    <script src="js/auth.js"></script>
    <script>
      function togglePassword() {
        const pass = document.getElementById("password");
        pass.type = pass.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>
